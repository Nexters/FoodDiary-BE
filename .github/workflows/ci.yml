name: Backend CI

# PR이 main 브랜치로 생성되거나 업데이트될 때 워크플로우 실행
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize]

jobs:
  build:
    # Ubuntu 22.04 환경에서 실행
    runs-on: ubuntu-22.04

    steps:
      # 1. 저장소 코드를 체크아웃
      - name: action checkout
        uses: actions/checkout@v4

      # 2. PR에 자동으로 reviewer와 assignee를 할당
      # .github/auto_assign.yml 파일의 설정에 따라 동작
      - name: Auto assign
        uses: kentaro-m/auto-assign-action@v2.0.0
        with:
          configuration-path: ".github/auto_assign.yml"

      # 3. Python 3.12 설치
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 4. pip 의존성 캐싱으로 빌드 속도 향상
      # 캐시 키는 OS와 requirements.txt의 해시값으로 생성
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 5. 의존성 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 6. 린트 검사 (Ruff — import 정렬 포함)
      - name: Lint with ruff
        run: ruff check .

      # 7. 포맷팅 검사 (Ruff)
      - name: Check code formatting with ruff
        run: ruff format --check .

      # 8. 테스트 실행 (pytest)
      - name: Run tests with pytest
        run: pytest
