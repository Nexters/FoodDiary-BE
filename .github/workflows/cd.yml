name: Backend CD

# main 브랜치에 push될 때 워크플로우 실행
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      # 1. 저장소 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Gabia Cloud Registry 로그인
      - name: Login to Gabia Cloud Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REPO_NAME }}
          username: ${{ secrets.DOCKER_REPO_USER_ID }}
          password: ${{ secrets.DOCKER_REPO_PWD }}

      # 3. Docker 이미지 빌드 및 푸시
      - name: Build and push Docker image
        run: |
          cp .env.example .env
          docker build -t ${{ secrets.DOCKER_REPO_NAME }}/fooddiary-api:${{ github.sha }} -f docker/Dockerfile .
          docker tag ${{ secrets.DOCKER_REPO_NAME }}/fooddiary-api:${{ github.sha }} ${{ secrets.DOCKER_REPO_NAME }}/fooddiary-api:latest
          docker push ${{ secrets.DOCKER_REPO_NAME }}/fooddiary-api:${{ github.sha }}
          docker push ${{ secrets.DOCKER_REPO_NAME }}/fooddiary-api:latest

      # 4. SSH로 서버 접속 후 배포
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.API_SERVER_HOST }}
          username: ${{ secrets.API_SERVER_USERNAME }}
          key: ${{ secrets.API_SERVER_KEY }}
          port: ${{ secrets.API_SERVER_PORT }}
          script: |
            # 기존 컨테이너 중지 및 제거
            sudo docker stop fooddiary-api || true
            sudo docker rm fooddiary-api || true

            # 사용하지 않는 모든 이미지 제거
            sudo docker image prune -a -f

            # 새 이미지 pull
            sudo docker pull ${{ secrets.DOCKER_REPO_NAME }}/fooddiary-api:${{ github.sha }}

            # 새 컨테이너 실행 (민감한 환경변수만 주입)
            sudo docker run -d \
              --name fooddiary-api \
              -v ${{ secrets.STORAGE_PATH }}:/app/storage \
              -p 8000:8000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e APPLE_CLIENT_ID="${{ secrets.APPLE_CLIENT_ID }}" \
              -e JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
              -e GOOGLE_ANDROID_CLIENT_ID="${{ secrets.GOOGLE_ANDROID_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e GOOGLE_REDIRECT_URI="${{ secrets.GOOGLE_REDIRECT_URI }}" \
              -e FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}" \
              -e KAKAO_REST_API_KEY="${{ secrets.KAKAO_REST_API_KEY }}" \
              --restart unless-stopped \
              ${{ secrets.DOCKER_REPO_NAME }}/fooddiary-api:${{ github.sha }}
