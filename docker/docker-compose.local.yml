# ======================
# FoodDiary Backend Docker Compose
# ======================
# PostgreSQL 로컬 개발 환경 구성
# 애플리케이션은 로컬에서 직접 실행

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: fooddiary-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fooddiary
      POSTGRES_USER: fooddiary_user
      POSTGRES_PASSWORD: fooddiary1234
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fooddiary_user -d fooddiary"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fooddiary-network

networks:
  fooddiary-network:
    name: fooddiary-network
    driver: bridge
