# ======================
# FoodDiary Backend Docker Compose
# ======================
# FastAPI + PostgreSQL 개발 환경 구성

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: fooddiary-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fooddiary
      POSTGRES_USER: fooddiary_user
      POSTGRES_PASSWORD: fooddiary1234
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fooddiary_user -d fooddiary"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fooddiary-network

  # FastAPI Application
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fooddiary-api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Database (Docker network 전용)
      DATABASE_URL: postgresql://fooddiary_user:fooddiary1234@db:5432/fooddiary
    ports:
      - "8000:8000"
    volumes:
      # Development: mount source code for hot reload
      - ../app:/app/app:ro
      - ../tests:/app/tests:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fooddiary-network

volumes:
  postgres_data:
    name: fooddiary-postgres-data

networks:
  fooddiary-network:
    name: fooddiary-network
    driver: bridge
