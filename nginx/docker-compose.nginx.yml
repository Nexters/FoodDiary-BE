# ======================
# Nginx Reverse Proxy Docker Compose
# ======================
# 애플리케이션과 분리된 Nginx 리버스 프록시 + Certbot
# 애플리케이션은 호스트에서 직접 실행 (localhost:8000)

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: mumuk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
      - ${STORAGE_PATH}:/var/www/images:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: /bin/sh -c "nginx -g 'daemon off;' & while :; do sleep 6h; nginx -s reload; done"

  certbot:
    image: certbot/certbot:latest
    container_name: mumuk-certbot
    restart: unless-stopped
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done"

volumes:
  certbot-webroot:
  certbot-certs:
    external: true
